<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="背脂記錄">
<title>母豬背脂記錄</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;--text:#e8eaf6;--text2:#8b90b8;--accent:#4f8ef7;--fat:#e05c5c;--fat-bg:#2a1a1a;--mid:#4caf7d;--mid-bg:#1a2a20;--thin:#e0a040;--thin-bg:#2a2010;--btn:#252942;--btn-active:#3a3f6e;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:40px;user-select:none}
.screen{display:none;padding:0 16px}.screen.active{display:block}
.setup-header{padding:48px 0 24px;text-align:center}
.setup-header h1{font-size:26px;font-weight:700;letter-spacing:-0.5px}
.setup-header p{font-size:14px;color:var(--text2);margin-top:6px}
.section-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px}
.section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.thresh-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.thresh-row:last-child{border-bottom:none}
.thresh-label{font-size:14px;color:var(--text2)}
.thresh-val{display:flex;align-items:center;gap:8px}
.thresh-val span{font-size:16px;font-weight:700;min-width:32px;text-align:right}
.thresh-adj{width:32px;height:32px;background:var(--btn);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.thresh-adj:active{background:var(--btn-active)}
.start-btn{width:100%;padding:18px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px;transition:opacity .15s}
.start-btn:active{opacity:.85}
.measure-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 12px}
.back-btn{background:var(--btn);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:13px;font-family:inherit;padding:8px 14px;cursor:pointer}
.session-info{font-size:13px;color:var(--text2);text-align:right}
.session-info strong{color:var(--text)}
.result-panel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px;min-height:90px;display:flex;align-items:center;justify-content:space-between;transition:border-color .2s}
.result-panel.fat{border-color:var(--fat);background:var(--fat-bg)}
.result-panel.mid{border-color:var(--mid);background:var(--mid-bg)}
.result-panel.thin{border-color:var(--thin);background:var(--thin-bg)}
.result-sow{font-size:28px;font-weight:700;letter-spacing:-1px}
.result-bf{font-size:14px;color:var(--text2);margin-top:4px}
.result-grade{font-size:20px;font-weight:700;padding:8px 16px;border-radius:10px}
.fat .result-grade{color:var(--fat);background:rgba(224,92,92,.15)}
.mid .result-grade{color:var(--mid);background:rgba(76,175,125,.15)}
.thin .result-grade{color:var(--thin);background:rgba(224,160,64,.15)}
.result-empty{color:var(--text2);font-size:14px;width:100%;text-align:center}
.input-section{margin-bottom:12px}
.input-label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:block}
.input-display{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:14px 16px;font-size:28px;font-weight:700;letter-spacing:2px;min-height:64px;display:flex;align-items:center;transition:border-color .15s}
.input-display.active{border-color:var(--accent)}
.input-display .cursor{display:inline-block;width:2px;height:32px;background:var(--accent);margin-left:2px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.placeholder{color:var(--text2);font-size:18px;font-weight:400;letter-spacing:0}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.num-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:26px;font-weight:500;font-family:inherit;padding:20px 0;cursor:pointer;transition:background .1s;text-align:center}
.num-btn:active{background:var(--btn-active)}
.num-btn.dash,.num-btn.del{font-size:22px;color:var(--text2)}
.num-btn.confirm{background:var(--accent);border-color:var(--accent);color:#fff;font-size:18px;font-weight:700}
.num-btn.confirm:active{opacity:.85}
.step-indicator{display:flex;gap:6px;margin-bottom:12px}
.step{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .2s}
.step.active{background:var(--accent)}
.sync-banner{background:var(--surface2);border:1px solid var(--thin);border-radius:10px;padding:8px 12px;font-size:13px;color:var(--thin);margin-bottom:8px;display:none;align-items:center;gap:8px}
.records-header{padding:48px 0 16px;display:flex;align-items:center;justify-content:space-between}
.records-header h1{font-size:22px;font-weight:700}
.export-btn{background:var(--btn);border:1px solid var(--border);border-radius:10px;color:var(--accent);font-size:13px;font-family:inherit;padding:8px 14px;cursor:pointer}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px;text-align:center}
.stat-num{font-size:28px;font-weight:700}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.stat-card.fat-card .stat-num{color:var(--fat)}
.stat-card.thin-card .stat-num{color:var(--thin)}
.record-list{display:flex;flex-direction:column;gap:8px}
.record-item{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.record-item.fat{border-left:3px solid var(--fat)}
.record-item.mid{border-left:3px solid var(--mid)}
.record-item.thin{border-left:3px solid var(--thin)}
.rec-id{font-size:17px;font-weight:700}
.rec-meta{font-size:12px;color:var(--text2);margin-top:2px}
.rec-right{text-align:right}
.rec-bf{font-size:17px;font-weight:700}
.rec-grade{font-size:12px;margin-top:2px;font-weight:500}
.fat .rec-grade{color:var(--fat)}.mid .rec-grade{color:var(--mid)}.thin .rec-grade{color:var(--thin)}
.empty-msg{text-align:center;padding:48px 0;color:var(--text2);font-size:15px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-btn{flex:1;padding:12px 0 16px;background:none;border:none;color:var(--text2);font-size:11px;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:22px}
.count-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--text2);display:inline-block;margin-bottom:8px}
.count-badge strong{color:var(--text)}
.search-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:15px;color:var(--text);font-family:inherit;width:100%;margin-bottom:12px;outline:none}
.search-box:focus{border-color:var(--accent)}
.history-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.history-row:last-child{border-bottom:none}
.history-day{font-size:12px;color:var(--text2);min-width:64px;line-height:1.4}
.history-bar-wrap{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.history-bar{height:100%;border-radius:4px}
.history-bar.fat{background:var(--fat)}
.history-bar.mid{background:var(--mid)}
.history-bar.thin{background:var(--thin)}
.history-val{font-size:13px;font-weight:700;min-width:54px;text-align:right;line-height:1.4}
</style>
</head>
<body>

<div class="screen active" id="screen-setup">
  <div style="padding:0 0 80px">
    <div class="setup-header">
      <h1>母豬背脂記錄</h1>
      <p>開始前請設定本批量測參數</p>
    </div>
    <div class="section-card">
      <div class="section-title">懷孕天數</div>
      <div style="display:flex;align-items:center;gap:12px">
        <input type="number" id="input-day" value="29" min="1" max="114"
          style="flex:1;background:var(--btn);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:28px;font-weight:700;font-family:inherit;padding:14px 16px;text-align:center;-webkit-appearance:none"
          oninput="config.day=parseInt(this.value)||1">
        <span style="font-size:16px;color:var(--text2);white-space:nowrap">天</span>
      </div>
    </div>
    <div class="section-card">
      <div class="section-title">分級閾值（mm）</div>
      <div class="thresh-row">
        <span class="thresh-label" style="color:var(--fat)">偏肥 ≥</span>
        <div class="thresh-val">
          <button class="thresh-adj" onclick="adj('fat',-1)">−</button>
          <span id="val-fat">16</span>
          <button class="thresh-adj" onclick="adj('fat',1)">+</button>
          <span style="font-size:13px;color:var(--text2)">mm</span>
        </div>
      </div>
      <div class="thresh-row">
        <span class="thresh-label" style="color:var(--mid)">中等</span>
        <div style="font-size:14px;color:var(--text2)" id="mid-range">11–15.9 mm</div>
      </div>
      <div class="thresh-row">
        <span class="thresh-label" style="color:var(--thin)">偏瘦 &lt;</span>
        <div class="thresh-val">
          <button class="thresh-adj" onclick="adj('thin',-1)">−</button>
          <span id="val-thin">11</span>
          <button class="thresh-adj" onclick="adj('thin',1)">+</button>
          <span style="font-size:13px;color:var(--text2)">mm</span>
        </div>
      </div>
    </div>
    <button class="start-btn" onclick="startSession()">開始量測</button>
  </div>
</div>

<div class="screen" id="screen-measure">
  <div style="padding-bottom:90px">
    <div class="measure-header">
      <button class="back-btn" onclick="showScreen('setup')">← 設定</button>
      <div class="session-info">懷孕 <strong id="m-day">29</strong> 天 ｜ 偏肥≥<strong id="m-fat">16</strong> 偏瘦&lt;<strong id="m-thin">11</strong></div>
    </div>
    <div class="sync-banner" id="sync-banner">⏳ <span id="sync-text">0</span> 筆待同步，連網後自動上傳</div>
    <div class="count-badge">本批已記錄 <strong id="session-count">0</strong> 頭</div>
    <div class="result-panel" id="result-panel">
      <div class="result-empty">輸入耳號開始記錄</div>
    </div>
    <div class="step-indicator">
      <div class="step active" id="step1"></div>
      <div class="step" id="step2"></div>
    </div>
    <div class="input-section">
      <span class="input-label" id="input-label">耳號</span>
      <div class="input-display active" id="input-display">
        <span class="placeholder">1234-5</span>
      </div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="numPress('1')">1</button>
      <button class="num-btn" onclick="numPress('2')">2</button>
      <button class="num-btn" onclick="numPress('3')">3</button>
      <button class="num-btn" onclick="numPress('4')">4</button>
      <button class="num-btn" onclick="numPress('5')">5</button>
      <button class="num-btn" onclick="numPress('6')">6</button>
      <button class="num-btn" onclick="numPress('7')">7</button>
      <button class="num-btn" onclick="numPress('8')">8</button>
      <button class="num-btn" onclick="numPress('9')">9</button>
      <button class="num-btn dash" id="special-btn" onclick="numPress('-')">－</button>
      <button class="num-btn" onclick="numPress('0')">0</button>
      <button class="num-btn del" onclick="numDel()">⌫</button>
      <button class="num-btn confirm" onclick="numConfirm()" style="grid-column:span 3">確認</button>
    </div>
  </div>
</div>

<div class="screen" id="screen-records">
  <div style="padding-bottom:90px">
    <div class="records-header">
      <h1>記錄</h1>
      <div style="display:flex;gap:8px">
        <button class="export-btn" onclick="exportCSV()">匯出 CSV</button>
        <button class="export-btn" style="color:var(--fat)" onclick="clearAll()">清除</button>
      </div>
    </div>
    <input class="search-box" type="text" id="search-input" placeholder="搜尋耳號..." oninput="renderRecords()">
    <div id="records-content"></div>
  </div>
</div>

<div id="history-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:200;overflow-y:auto;padding:16px">
  <div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;max-width:398px;margin:60px auto 0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:20px;font-weight:700" id="modal-title">歷史記錄</div>
      <button onclick="closeHistory()" style="background:var(--btn);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:14px;padding:6px 12px;cursor:pointer;font-family:inherit">關閉</button>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav" style="display:none">
  <button class="nav-btn active" id="nav-measure" onclick="showScreen('measure')">
    <span class="nav-icon">📏</span>量測
  </button>
  <button class="nav-btn" id="nav-records" onclick="showScreen('records')">
    <span class="nav-icon">📋</span>記錄
  </button>
</nav>

<script>
const SHEETS_URL='https://script.google.com/macros/s/AKfycbxI5mQyfoAmnxA5tf5DprM-Alq15Dfyi_dbSfYpnp3dFus9XGnj1fLd6Br5EZLnIAua/exec';
let config={day:29,fat:16,thin:11};
let inputStep=1,currentInput='',currentSowId='';
let records=[],queue=[],sessionCount=0;

function load(){
  try{records=JSON.parse(localStorage.getItem('bf_records')||'[]')}catch(e){records=[]}
  try{queue=JSON.parse(localStorage.getItem('bf_queue')||'[]')}catch(e){queue=[]}
}
function saveRec(){try{localStorage.setItem('bf_records',JSON.stringify(records))}catch(e){}}
function saveQueue(){try{localStorage.setItem('bf_queue',JSON.stringify(queue))}catch(e){}}
load();

function adj(key,delta){
  config[key]=Math.max(1,Math.min(40,config[key]+delta));
  document.getElementById('val-'+key).textContent=config[key];
  updateMidRange();
}
function updateMidRange(){
  document.getElementById('mid-range').textContent=config.thin+'–'+(config.fat-0.1).toFixed(1)+' mm';
}

function startSession(){
  sessionCount=0;
  document.getElementById('session-count').textContent=0;
  document.getElementById('m-day').textContent=config.day;
  document.getElementById('m-fat').textContent=config.fat;
  document.getElementById('m-thin').textContent=config.thin;
  showScreen('measure');
  resetInput();
  updateSyncBanner();
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+name);
  if(nb)nb.classList.add('active');
  document.getElementById('bottom-nav').style.display=name==='setup'?'none':'flex';
  if(name==='records')renderRecords();
}

function resetInput(){
  inputStep=1;currentInput='';currentSowId='';
  document.getElementById('input-label').textContent='耳號';
  document.getElementById('step1').classList.add('active');
  document.getElementById('step2').classList.remove('active');
  document.getElementById('special-btn').textContent='－';
  updateDisplay();
}

function updateDisplay(){
  const el=document.getElementById('input-display');
  if(!currentInput){
    el.innerHTML=inputStep===1?'<span class="placeholder">1234-5</span>':'<span class="placeholder">16.5</span>';
  }else{
    el.innerHTML=currentInput+'<span class="cursor"></span>';
  }
}

function numPress(val){
  if(val==='-'&&inputStep===2){if(!currentInput.includes('.'))currentInput+='.';updateDisplay();return;}
  currentInput+=val;updateDisplay();
}
function numDel(){currentInput=currentInput.slice(0,-1);updateDisplay();}

function numConfirm(){
  if(!currentInput)return;
  if(inputStep===1){
    currentSowId=currentInput.toUpperCase();currentInput='';inputStep=2;
    document.getElementById('input-label').textContent='背脂厚度 (mm)';
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
    document.getElementById('special-btn').textContent='．';
    updateDisplay();
  }else{
    const bf=parseFloat(currentInput);
    if(isNaN(bf)){currentInput='';updateDisplay();return;}
    addRecord(currentSowId,bf);resetInput();
  }
}

function classify(bf){
  if(bf>=config.fat)return{label:'偏肥',cls:'fat'};
  if(bf<config.thin)return{label:'偏瘦',cls:'thin'};
  return{label:'中等',cls:'mid'};
}

function addRecord(sowId,bf){
  const c=classify(bf);
  const now=new Date();
  const rec={sowId,bf:parseFloat(bf.toFixed(1)),grade:c.label,cls:c.cls,day:config.day,
    time:now.toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
    ts:now.getTime()};
  records.unshift(rec);saveRec();
  sessionCount++;document.getElementById('session-count').textContent=sessionCount;

  const panel=document.getElementById('result-panel');
  panel.className='result-panel '+c.cls;
  panel.innerHTML=`<div><div class="result-sow">${sowId}</div><div class="result-bf">懷孕 ${config.day} 天 ｜ ${bf.toFixed(1)} mm</div></div><div class="result-grade">${c.label}</div>`;

  if(navigator.onLine){syncOne(rec);}
  else{queue.push(rec);saveQueue();updateSyncBanner();}
}

function syncOne(rec){
  return fetch(SHEETS_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({sowId:rec.sowId,bf:rec.bf,day:rec.day,grade:rec.grade})})
    .catch(()=>{queue.push(rec);saveQueue();updateSyncBanner();});
}

async function flushQueue(){
  if(!queue.length||!navigator.onLine)return;
  const toSync=[...queue];queue=[];saveQueue();updateSyncBanner();
  for(const rec of toSync){
    try{await syncOne(rec);}catch(e){queue.push(rec);saveQueue();}
  }
  updateSyncBanner();
}

function updateSyncBanner(){
  const banner=document.getElementById('sync-banner');
  const text=document.getElementById('sync-text');
  if(queue.length>0){text.textContent=queue.length;banner.style.display='flex';}
  else{banner.style.display='none';}
}

window.addEventListener('online',flushQueue);
setInterval(()=>{if(navigator.onLine&&queue.length)flushQueue();},30000);

function renderRecords(){
  const el=document.getElementById('records-content');
  const q=(document.getElementById('search-input').value||'').toUpperCase().trim();
  const filtered=q?records.filter(r=>r.sowId.includes(q)):records;

  if(!filtered.length){
    el.innerHTML='<div class="empty-msg">'+(q?'找不到「'+q+'」':'尚無記錄')+'</div>';return;
  }

  const total=filtered.length;
  const fat=filtered.filter(r=>r.cls==='fat').length;
  const thin=filtered.filter(r=>r.cls==='thin').length;

  const rows=filtered.slice(0,200).map(r=>{
    const idx=records.indexOf(r);
    return `<div class="record-item ${r.cls}"
      ontouchstart="startLongPress(${idx},this)" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()"
      onclick="showHistory('${r.sowId}')">
      <div><div class="rec-id">${r.sowId}</div><div class="rec-meta">懷孕 ${r.day} 天 ｜ ${r.time}</div></div>
      <div class="rec-right"><div class="rec-bf">${r.bf} mm</div><div class="rec-grade">${r.grade}</div></div>
    </div>`;
  }).join('');

  el.innerHTML=
    `<div class="stats-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">筆數</div></div>
      <div class="stat-card fat-card"><div class="stat-num">${fat}</div><div class="stat-label">偏肥</div></div>
      <div class="stat-card thin-card"><div class="stat-num">${thin}</div><div class="stat-label">偏瘦</div></div>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">點擊查看歷史 ｜ 長按刪除</div>
    <div class="record-list">`+rows+`</div>`;
}

function showHistory(sowId){
  const history=records.filter(r=>r.sowId===sowId).sort((a,b)=>a.ts-b.ts);
  document.getElementById('modal-title').textContent=sowId+' 歷史記錄';
  const maxBf=Math.max(...history.map(r=>r.bf),1);
  const rows=history.map(r=>{
    const pct=Math.round((r.bf/maxBf)*100);
    return `<div class="history-row">
      <div class="history-day">第${r.day}天<br><span style="font-size:11px">${r.time}</span></div>
      <div class="history-bar-wrap"><div class="history-bar ${r.cls}" style="width:${pct}%"></div></div>
      <div class="history-val" style="color:var(--${r.cls})">${r.bf}mm<br><span style="font-size:11px">${r.grade}</span></div>
    </div>`;
  }).join('');
  document.getElementById('modal-content').innerHTML=rows||'<div class="empty-msg">無記錄</div>';
  document.getElementById('history-modal').style.display='block';
}

function closeHistory(){document.getElementById('history-modal').style.display='none';}

let longPressTimer=null;
function startLongPress(index,el){
  longPressTimer=setTimeout(()=>{
    el.style.opacity='0.5';
    if(confirm('刪除「'+records[index].sowId+'」這筆記錄？')){
      records.splice(index,1);saveRec();renderRecords();
    }else{el.style.opacity='1';}
  },600);
}
function cancelLongPress(){if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}}

function clearAll(){
  if(!records.length){alert('尚無記錄');return;}
  if(confirm('確定清除全部 '+records.length+' 筆記錄？此動作無法復原')){
    records=[];saveRec();renderRecords();
  }
}

function exportCSV(){
  if(!records.length){alert('尚無記錄');return;}
  const header='日期時間,耳號,背脂(mm),懷孕天數,分級\n';
  const rows=records.map(r=>`${r.time},${r.sowId},${r.bf},${r.day},${r.grade}`).join('\n');
  const blob=new Blob(['\uFEFF'+header+rows],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='母豬背脂記錄.csv';a.click();URL.revokeObjectURL(url);
}

updateMidRange();
updateSyncBanner();
flushQueue();
</script>
